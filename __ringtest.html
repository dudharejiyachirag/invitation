<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { background:#fcfbf7; margin:0; display:flex; align-items:center; justify-content:center; height:100vh; }
  .ring-canvas { width:360px; height:360px; }
</style>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<canvas id="ringCanvas" class="ring-canvas"></canvas>
<script>
function isWebGLAvailable() {
  try {
    const canvas = document.createElement("canvas");
    return !!(window.WebGLRenderingContext && (canvas.getContext("webgl") || canvas.getContext("experimental-webgl")));
  } catch (e) { return false; }
}
</script>
<script src="__ringtest.js"></script>
<script>
  window.__err = [];
  window.addEventListener("error", e => window.__err.push(String(e.message)));
  initRingScene();
</script>
</body>
</html>
